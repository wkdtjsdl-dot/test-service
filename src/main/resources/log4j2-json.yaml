Configuration:
  status: warn

  Appenders:
    Console:
      - name: Console_Logger
        target: SYSTEM_OUT
        JsonLayout:
          objectMessageAsJsonObject: true
          compact: true
          eventEol: true
          properties: true
          complete: false
          charset: UTF-8

  Loggers:
    Root:
      level: info
      AppenderRef:
        - ref: Console_Logger
